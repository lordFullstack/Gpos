<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<meta name="theme-color" content="#027373"/>
<title>Gastro POS</title>
<link rel="manifest" href="manifest.json"/>
<link rel="stylesheet" href="styles.css"/>

<!-- React + Babel CDN -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
</head>
<body>
<div id="root"></div>

<!-- Core -->
<script type="text/babel" src="db.js"></script>
<script type="text/babel" src="app.js"></script>

<!-- Módulos -->
<script type="text/babel" src="modules/pos.js"></script>
<script type="text/babel" src="modules/orders.js"></script>
<script type="text/babel" src="modules/inventory.js"></script>
<script type="text/babel" src="modules/accounting.js"></script>
<script type="text/babel" src="modules/reports.js"></script>

<!-- Boot -->
<script type="text/babel">
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>

<script>
if('serviceWorker' in navigator){
  window.addEventListener('load',()=>{
    navigator.serviceWorker.register('sw.js').catch(()=>{});
  });
}
</script>
</body>
</html>
